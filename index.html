<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race V2 - Stabilized</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #1e90ff; margin: 0; color: #333; overflow-x: hidden; }
        #race-track { position: relative; height: 60vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); overflow: hidden; border-bottom: 5px solid white; display: flex; align-items: flex-end; }
        .player-visual { position: absolute; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; width: 60px; }
        .char-icon { font-size: 40px; }
        .char-name { font-size: 11px; background: white; border-radius: 5px; padding: 2px 5px; font-weight: bold; margin-bottom: 5px; white-space: nowrap; }
        #mobile-controller { padding: 20px; background: white; min-height: 40vh; border-radius: 30px 30px 0 0; margin-top: -20px; position: relative; z-index: 10; }
        .question-box { background: #f1f2f6; padding: 20px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem; }
        .opt-btn { width: 100%; padding: 15px; margin: 5px 0; border: none; background: #2ed573; color: white; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #26af5a; }
        .opt-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #26af5a; }
        #host-panel { position: fixed; top: 10px; left: 10px; z-index: 9999; display: none; background: white; padding: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #login-overlay, #waiting-overlay { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #leaderboard { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; }
        @media (min-width: 1024px) { #race-track { height: 90vh; } #mobile-controller { display: none; } .char-icon { font-size: 60px; } }
    </style>
</head>
<body>

<div id="host-panel">
    <button onclick="startGame()" style="background:#2ed573; color:white; border:none; padding:10px; border-radius:5px;">🏁 START GAME</button>
    <button onclick="resetGame()" style="background:#ff4757; color:white; border:none; padding:10px; border-radius:5px;">🔄 RESET ALL</button>
</div>

<div id="login-overlay">
    <h1>☁️ CLOUD RACE V2</h1>
    <input type="text" id="input-nama" placeholder="Ketik namamu..." style="padding:15px; width:70%; font-size:1.2rem; margin-bottom:15px;">
    <button class="opt-btn" onclick="joinGame()" style="width: 200px;">MASUK BALAPAN</button>
</div>

<div id="waiting-overlay" style="display:none;">
    <h2>Sip, Sudah Masuk!</h2>
    <p>Tunggu Host menekan START...</p>
</div>

<div id="leaderboard">
    <h1>🏆 HASIL AKHIR 🏆</h1>
    <div id="rank-list" style="width: 350px; background: white; color: black; border-radius: 15px; padding: 20px;"></div>
    <p style="margin-top:20px;">Host akan mereset sebentar lagi...</p>
</div>

<div id="race-track"></div>

<div id="mobile-controller">
    <div id="game-ui" style="display:none;">
        <div class="question-box" id="q-text">Mengambil soal...</div>
        <div id="options-container"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABP2VWkLjNjuiy7ELHf8c8j5sTrjr04dE",
        authDomain: "cloudgamev2.firebaseapp.com",
        projectId: "cloudgamev2",
        storageBucket: "cloudgamev2.firebasestorage.app",
        messagingSenderId: "369609219804",
        appId: "1:369609219804:web:5dd1e7ed51da5779571e19",
        measurementId: "G-P2TXY9GF07",
        databaseURL: "https://cloudgamev2-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const isHost = urlParams.get('role') === 'host';
    
    let myID = "P" + Math.floor(Math.random()*1000000); 
    let myName = "";
    let myStep = 0;
    let daftarSoal = [];
    const icons = ["🐦", "🐤", "🦄", "🦊", "🐱", "🐶", "🐰", "🐯", "🐸", "🐼"];

    // 1. MUAT SOAL DARI soal.csv
    async function loadSoal() {
        try {
            const res = await fetch('soal.csv');
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");
            daftarSoal = lines.map(l => {
                const k = l.split(',');
                return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
            });
            console.log("Soal siap!");
        } catch (e) { 
            document.getElementById('q-text').innerText = "Gagal memuat soal.csv!";
        }
    }

    loadSoal();

    if (isHost) {
        document.getElementById('host-panel').style.display = 'block';
        document.getElementById('login-overlay').style.display = 'none';
    }

    function joinGame() {
        myName = document.getElementById('input-nama').value.trim();
        if(!myName) return alert("Isi nama dulu!");
        
        db.ref('players/' + myID).set({
            name: myName,
            pos: 20,
            icon: icons[Math.floor(Math.random()*icons.length)],
            step: 0,
            finished: false
        });

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('waiting-overlay').style.display = 'flex';
    }

    // 2. MONITOR STATUS GAME
    db.ref('status').on('value', snap => {
        const status = snap.val();
        if (status === 'playing' && !isHost && myName !== "") {
            document.getElementById('waiting-overlay').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            renderSoal(); // Pastikan render dipanggil saat start
        } else if (!status || status === 'waiting') {
            if (!isHost) location.reload(); // Reset otomatis semua peserta jika Host reset
        }
    });

    function startGame() { db.ref('status').set('playing'); }

    function resetGame() {
        if(confirm("Hapus semua data balapan?")) {
            db.ref('/').set({ status: 'waiting' });
            location.reload();
        }
    }

    // 3. LOGIKA SOAL
    function renderSoal() {
        if(myStep >= daftarSoal.length) {
            document.getElementById('q-text').innerHTML = "FINISH! 🏁<br>Lihat Layar Utama";
            document.getElementById('options-container').innerHTML = "";
            db.ref('players/' + myID).update({ finished: true });
            return;
        }
        
        const data = daftarSoal[myStep];
        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        data.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt.toLowerCase() === data.a.toLowerCase()) {
                    myStep++;
                    db.ref('players/' + myID).update({
                        pos: 20 + (myStep * 60),
                        step: myStep
                    });
                    renderSoal();
                } else {
                    btn.style.background = "#ff4757";
                    setTimeout(() => btn.style.background = "#2ed573", 500);
                }
            };
            container.appendChild(btn);
        });
    }

    // 4. UPDATE ARENA & LEADERBOARD
    db.ref('players').on('value', snapshot => {
        const players = snapshot.val();
        const track = document.getElementById('race-track');
        track.innerHTML = "";
        if(!players) return;

        const entries = Object.entries(players);
        entries.forEach(([id, data], index) => {
            if(!data.name) return; // Mencegah undefined
            const spacing = 100 / (entries.length + 1);
            const pDiv = document.createElement('div');
            pDiv.className = "player-visual";
            pDiv.style.left = (spacing * (index + 1)) + "%";
            pDiv.style.bottom = data.pos + "px";
            pDiv.innerHTML = `<div class="char-name">${data.name}</div><div class="char-icon">${data.icon}</div>`;
            track.appendChild(pDiv);
        });

        // Tampilkan leaderboard jika semua sudah finish
        const allFinished = entries.every(e => e[1].finished);
        if(allFinished && entries.length > 0) {
            const sorted = entries.sort((a, b) => b[1].step - a[1].step);
            document.getElementById('rank-list').innerHTML = sorted.map((w, i) => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;">
                    <b>#${i+1} ${w[1].name}</b> <span>${w[1].icon}</span>
                </div>
            `).join('');
            document.getElementById('leaderboard').style.display = 'flex';
        }
    });
</script>
</body>
</html>
