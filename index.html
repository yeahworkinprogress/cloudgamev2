<!DOCTYPE html>
<html>
<head>
    <title>Cloud Race V2 - 22 Players</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #1e90ff; margin: 0; color: #333; }
        
        /* Layar Utama (Arena Balap) */
        #race-track { 
            position: relative; height: 60vh; width: 100%; 
            background: linear-gradient(to bottom, #1e90ff, #87CEEB); 
            overflow: hidden; border-bottom: 5px solid white;
            display: flex; align-items: flex-end; justify-content: space-around;
        }

        .player-visual { 
            position: absolute; transition: all 0.5s ease; 
            display: flex; flex-direction: column; align-items: center; width: 40px;
        }
        .char-icon { font-size: 30px; }
        .char-name { font-size: 10px; background: rgba(255,255,255,0.7); border-radius: 5px; padding: 2px; }

        /* Panel Kontrol HP */
        #mobile-controller { padding: 20px; background: white; min-height: 40vh; }
        .question-box { background: #f1f2f6; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem; }
        .opt-btn { 
            width: 100%; padding: 15px; margin: 5px 0; border: none; 
            background: #2ed573; color: white; border-radius: 10px; 
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #26af5a;
        }

        /* Overlay Login */
        #login-overlay { 
            position: fixed; inset: 0; background: white; z-index: 5000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        input { padding: 15px; width: 80%; font-size: 1.2rem; border-radius: 10px; border: 2px solid #ccc; margin-bottom: 10px; }
        
        #leaderboard { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; 
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000;
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>☁️ CLOUD RACE V2 ☁️</h2>
    <input type="text" id="input-nama" placeholder="Masukkan Namamu...">
    <button class="opt-btn" onclick="joinGame()" style="width: 200px;">MULAI MAIN!</button>
</div>

<div id="leaderboard">
    <h1>🏆 PEMENANG 🏆</h1>
    <div id="rank-list" style="width: 80%; background: white; color: black; border-radius: 20px; padding: 20px;"></div>
    <button class="opt-btn" onclick="location.reload()" style="width: 200px; margin-top: 20px;">MAIN LAGI</button>
</div>

<div id="race-track">
    </div>

<div id="mobile-controller">
    <div id="game-ui" style="display:none;">
        <div class="question-box" id="q-text">Memuat soal...</div>
        <div id="options-container"></div>
    </div>
</div>

<script>
    // --- CONFIG FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyCIuO03IS3xOk-LrMP2DnzYHvguLT4-Rzc",
        authDomain: "cloudgame-30a5d.firebaseapp.com",
        databaseURL: "https://cloudgame-30a5d-default-rtdb.firebaseio.com",
        projectId: "cloudgame-30a5d",
        storageBucket: "cloudgame-30a5d.firebasestorage.app",
        messagingSenderId: "744636805808",
        appId: "1:744636805808:web:f1dd3123b48a538ca2c175"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myID = localStorage.getItem('playerID') || "P" + Math.floor(Math.random()*1000000);
    localStorage.setItem('playerID', myID);

    let myName = "";
    let myStep = 0;
    let daftarSoal = [];
    const icons = ["🐦", "🐤", "🦄", "🦊", "🐱", "🐶", "🐭", "🐹", "🐰", "🐯", "🦁", "🐮", "🐷", "🐸", "🐵", "🐼", "🐨", "🦀", "🦞", "🦕", "🐝", "🦋"];

    // 1. Ambil Soal
    async function getSoal() {
        const res = await fetch('soal.csv');
        const text = await res.text();
        const lines = text.split('\n').filter(l => l.trim() !== "");
        daftarSoal = lines.map(l => {
            const k = l.split(',');
            return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
        });
        renderSoal();
    }

    // 2. Gabung Game
    function joinGame() {
        myName = document.getElementById('input-nama').value;
        if(!myName) return alert("Isi nama dulu!");
        
        const myIcon = icons[Math.floor(Math.random()*icons.length)];
        
        db.ref('players/' + myID).set({
            name: myName,
            pos: 20,
            icon: myIcon,
            step: 0,
            finished: false
        });

        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        getSoal();
    }

    // 3. Render Soal di HP masing-masing
    function renderSoal() {
        if(myStep >= daftarSoal.length) {
            document.getElementById('game-ui').innerHTML = "<h2>FINISH! Tunggu yang lain ya... 🏁</h2>";
            db.ref('players/' + myID + '/finished').set(true);
            return;
        }
        const data = daftarSoal[myStep];
        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        data.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => cekJawaban(opt, data.a);
            container.appendChild(btn);
        });
    }

    function cekJawaban(pilih, benar) {
        if(pilih.toLowerCase() === benar.toLowerCase()) {
            myStep++;
            db.ref('players/' + myID).transaction(p => {
                if(p) {
                    p.pos += 40;
                    p.step = myStep;
                }
                return p;
            });
            renderSoal();
        } else {
            alert("Salah! Coba lagi.");
        }
    }

    // 4. Sinkronisasi Arena Balap (Visual untuk 22 Orang)
    db.ref('players').on('value', snapshot => {
        const players = snapshot.val();
        const track = document.getElementById('race-track');
        track.innerHTML = "";
        
        if(!players) return;

        const entries = Object.entries(players);
        entries.forEach(([id, data], index) => {
            const spacing = 100 / (entries.length + 1);
            const pDiv = document.createElement('div');
            pDiv.className = "player-visual";
            pDiv.style.left = (spacing * (index + 1)) + "%";
            pDiv.style.bottom = data.pos + "px";
            pDiv.innerHTML = `
                <div class="char-name">${data.name}</div>
                <div class="char-icon">${data.icon}</div>
            `;
            track.appendChild(pDiv);
        });

        // Cek Pemenang
        const winners = entries
            .filter(e => e[1].finished)
            .sort((a, b) => a[1].step - b[1].step);
            
        if(winners.length > 0 && winners.length === entries.length) {
            showLeaderboard(winners);
        }
    });

    function showLeaderboard(winners) {
        const list = document.getElementById('rank-list');
        list.innerHTML = winners.map((w, i) => `
            <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #ccc">
                <b>#${i+1} ${w[1].name}</b> <span>${w[1].icon}</span>
            </div>
        `).join('');
        document.getElementById('leaderboard').style.display = 'flex';
    }

    // Fungsi Admin Reset (Ketik di Console browser jika perlu reset)
    window.resetSemua = () => {
        db.ref('players').remove();
        location.reload();
    }
</script>
</body>
</html>
