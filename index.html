<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cloud Race V2 - Force Start Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #1e90ff; margin: 0; color: #333; overflow-x: hidden; }
        #race-track { position: relative; height: 60vh; width: 100%; background: linear-gradient(to bottom, #1e90ff, #87CEEB); overflow: hidden; border-bottom: 5px solid white; display: flex; align-items: flex-end; }
        .player-visual { position: absolute; transition: all 0.6s ease-out; display: flex; flex-direction: column; align-items: center; width: 70px; }
        .char-icon { font-size: 40px; }
        .char-name { font-size: 11px; background: white; border-radius: 4px; padding: 2px 5px; font-weight: bold; margin-bottom: 5px; }
        #mobile-controller { padding: 20px; background: white; min-height: 40vh; border-radius: 25px 25px 0 0; margin-top: -20px; position: relative; z-index: 10; }
        .question-box { background: #f1f2f6; padding: 20px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; font-size: 1.1rem; }
        .opt-btn { width: 100%; padding: 15px; margin: 5px 0; border: none; background: #2ed573; color: white; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #26af5a; }
        #host-panel { position: fixed; top: 10px; left: 10px; z-index: 9999; display: none; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-admin { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; margin: 2px; }
        #login-overlay, #waiting-overlay { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #leaderboard { position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 6000; }
        @media (min-width: 1024px) { #race-track { height: 90vh; } #mobile-controller { display: none; } }
    </style>
</head>
<body>

<div id="host-panel">
    <div style="font-size: 10px; color: #666; margin-bottom: 5px;">ADMIN PANEL</div>
    <button class="btn-admin" style="background:#2ed573" onclick="startGame()">🏁 START</button>
    <button class="btn-admin" style="background:#ff4757" onclick="resetGame()">🔄 RESET</button>
</div>

<div id="login-overlay">
    <h2>☁️ CLOUD RACE</h2>
    <input type="text" id="input-nama" placeholder="Nama..." style="padding:15px; width:200px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
    <button class="opt-btn" onclick="joinGame()" style="width: 230px;">GABUNG</button>
</div>

<div id="waiting-overlay" style="display:none;">
    <h3>Sudah Terdaftar!</h3>
    <p>Menunggu Host menekan Start...</p>
    <div id="player-count" style="font-weight: bold; color: #1e90ff;"></div>
</div>

<div id="leaderboard">
    <h2>🏆 RANKING 🏆</h2>
    <div id="rank-list" style="width: 300px; background: white; color: black; border-radius: 10px; padding: 20px;"></div>
    <button class="btn-admin" style="background:#333; margin-top:20px;" onclick="location.reload()">TUTUP</button>
</div>

<div id="race-track"></div>

<div id="mobile-controller">
    <div id="game-ui" style="display:none;">
        <div class="question-box" id="q-text">Memuat...</div>
        <div id="options-container"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyABP2VWkLjNjuiy7ELHf8c8j5sTrjr04dE",
        authDomain: "cloudgamev2.firebaseapp.com",
        projectId: "cloudgamev2",
        storageBucket: "cloudgamev2.firebasestorage.app",
        messagingSenderId: "369609219804",
        appId: "1:369609219804:web:5dd1e7ed51da5779571e19",
        measurementId: "G-P2TXY9GF07",
        databaseURL: "https://cloudgamev2-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const isHost = urlParams.get('role') === 'host';
    
    let myID = localStorage.getItem('player_id') || "P" + Date.now();
    localStorage.setItem('player_id', myID);
    
    let myName = sessionStorage.getItem('player_name') || "";
    let myStep = 0;
    let daftarSoal = [];
    const icons = ["🦊", "🐱", "🐶", "🐹", "🐰", "🐯", "🐨", "🐼", "🦀", "🦖"];

    // 1. Muat Soal
    async function loadSoal() {
        try {
            const res = await fetch('soal.csv');
            const text = await res.text();
            const lines = text.split('\n').filter(l => l.trim() !== "");
            daftarSoal = lines.map(l => {
                const k = l.split(',');
                return { q: k[0].trim(), o: [k[1].trim(), k[2].trim(), k[3].trim()], a: k[4].trim() };
            });
        } catch (e) { console.error("Gagal soal.csv"); }
    }
    loadSoal();

    if (isHost) {
        document.getElementById('host-panel').style.display = 'block';
        document.getElementById('login-overlay').style.display = 'none';
    } else if (myName !== "") {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('waiting-overlay').style.display = 'flex';
    }

    function joinGame() {
        const val = document.getElementById('input-nama').value.trim();
        if(!val) return alert("Isi nama!");
        myName = val;
        sessionStorage.setItem('player_name', myName);
        db.ref('players/' + myID).set({
            name: myName, pos: 20, icon: icons[Math.floor(Math.random()*icons.length)], step: 0, finished: false
        });
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('waiting-overlay').style.display = 'flex';
    }

    // 2. Monitoring Status (KUNCI UTAMA)
    db.ref('status').on('value', snap => {
        const status = snap.val();
        console.log("Status Server:", status);
        
        if (status === 'playing') {
            if (!isHost && myName !== "") {
                document.getElementById('waiting-overlay').style.display = 'none';
                document.getElementById('game-ui').style.display = 'block';
                renderSoal();
            }
        } else {
            if (!isHost) {
                document.getElementById('game-ui').style.display = 'none';
                if (myName !== "") document.getElementById('waiting-overlay').style.display = 'flex';
            }
        }
    });

    // 3. Fungsi Admin
    function startGame() {
        console.log("Mencoba memulai game...");
        // Paksa set status ke playing
        db.ref('status').set('playing')
            .then(() => alert("Game DIMULAI! Periksa layar peserta."))
            .catch(err => alert("Gagal: " + err.message));
    }

    function resetGame() {
        if(confirm("Reset total?")) {
            db.ref('players').remove();
            db.ref('status').set('waiting');
            location.reload();
        }
    }

    // 4. Game Logic
    function renderSoal() {
        if(myStep >= daftarSoal.length) {
            document.getElementById('q-text').innerText = "FINISH! Cek layar utama.";
            document.getElementById('options-container').innerHTML = "";
            db.ref('players/' + myID).update({ finished: true });
            return;
        }
        const data = daftarSoal[myStep];
        document.getElementById('q-text').innerText = data.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        data.o.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt.toLowerCase() === data.a.toLowerCase()) {
                    myStep++;
                    db.ref('players/' + myID).update({ pos: 20 + (myStep * 60), step: myStep });
                    renderSoal();
                } else {
                    btn.style.background = "#ff4757";
                    setTimeout(() => btn.style.background = "#2ed573", 500);
                }
            };
            container.appendChild(btn);
        });
    }

    // 5. Render Arena
    db.ref('players').on('value', snap => {
        const players = snap.val();
        const track = document.getElementById('race-track');
        track.innerHTML = "";
        if(!players) return;
        
        const entries = Object.entries(players);
        // Update jumlah pemain di layar tunggu
        if(document.getElementById('player-count')) {
            document.getElementById('player-count').innerText = entries.length + " Pemain Terhubung";
        }

        entries.forEach(([id, data], i) => {
            const spacing = 100 / (entries.length + 1);
            const pDiv = document.createElement('div');
            pDiv.className = "player-visual";
            pDiv.style.left = (spacing * (i + 1)) + "%";
            pDiv.style.bottom = data.pos + "px";
            pDiv.innerHTML = `<div class="char-name">${data.name}</div><div class="char-icon">${data.icon}</div>`;
            track.appendChild(pDiv);
        });
    });
</script>
</body>
</html>
